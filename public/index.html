<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة ملخصاتي | AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex">

    <aside class="w-64 bg-indigo-900 text-white hidden md:flex flex-col p-6 shadow-xl">
        <h1 class="text-2xl font-bold mb-10 text-center">📚 ملخصاتي</h1>
        <nav class="space-y-4 flex-1">
            <button class="w-full text-right p-3 rounded bg-indigo-800 hover:bg-indigo-700 transition">تلخيص جديد</button>
            <button class="w-full text-right p-3 rounded hover:bg-indigo-800 transition">سجل الملخصات</button>
        </nav>
        <div class="text-xs text-indigo-300 border-t pt-4">نسخة احترافية v1.0</div>
    </aside>

    <main class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="p-4 glass shadow-sm flex justify-between items-center px-8">
            <h2 class="font-bold text-indigo-900">مساعدك الذكي من Claude</h2>
            <div class="flex gap-2">
                <span class="h-3 w-3 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-sm text-slate-500">متصل الآن</span>
            </div>
        </header>

        <div id="chatWindow" class="flex-1 overflow-y-auto p-6 space-y-6 bg-slate-50">
            <div class="bg-indigo-100 p-4 rounded-lg max-w-2xl ml-auto border border-indigo-200">
                مرحباً بك في <b>ملخصاتي</b>! ضع النص أو اسم الكتاب وسأقوم بتلخيصه لك فوراً.
            </div>
        </div>

        <div class="p-6 glass border-t">
            <div class="max-w-4xl mx-auto flex gap-4 bg-white p-2 rounded-2xl shadow-lg border">
                <input id="promptInput" type="text" placeholder="ماذا تريد أن نلخص اليوم؟" 
                       class="flex-1 p-3 outline-none bg-transparent">
                <button onclick="askClaude()" id="sendBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-xl font-bold transition">
                    إرسال
                </button>
            </div>
        </div>
    </main>

    <script>
        async function askClaude() {
            const input = document.getElementById('promptInput');
            const chatWindow = document.getElementById('chatWindow');
            const btn = document.getElementById('sendBtn');
            if(!input.value) return;

            const userText = input.value;
            chatWindow.innerHTML += `<div class="bg-white p-4 rounded-lg max-w-2xl shadow-sm mr-auto border border-slate-200">👤 ${userText}</div>`;
            input.value = '';
            btn.innerText = 'جاري التلخيص...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ prompt: userText })
                });
                const data = await res.json();
                chatWindow.innerHTML += `<div class="bg-indigo-50 p-6 rounded-lg max-w-3xl ml-auto border border-indigo-100 shadow-sm leading-relaxed text-slate-800">✨ ${data.text}</div>`;
                chatWindow.scrollTop = chatWindow.scrollHeight;
            } catch (e) {
                alert("حدث خطأ!");
            } finally {
                btn.innerText = 'إرسال';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
