<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ملخصاتي - مساعد Claude</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; }
        .msg { margin-bottom: 15px; padding: 10px; border-radius: 8px; max-width: 80%; }
        .user { background: #333; align-self: flex-start; }
        .ai { background: #6200ea; align-self: flex-end; }
        .error { background: #b00020; color: white; border: 1px solid white; }
        .input-area { padding: 20px; background: #1e1e1e; display: flex; }
        input { flex: 1; padding: 10px; border: none; border-radius: 4px; }
        button { padding: 10px 20px; margin-right: 10px; cursor: pointer; background: #6200ea; color: white; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="اكتب رسالتك هنا...">
        <button onclick="sendMessage()">إرسال</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const chat = document.getElementById('chat');
            if (!input.value) return;

            const userText = input.value;
            chat.innerHTML += `<div class="msg user"><b>أنت:</b> ${userText}</div>`;
            input.value = '';

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userText })
                });

                const data = await response.json();
                
                if (response.ok) {
                    chat.innerHTML += `<div class="msg ai"><b>Claude:</b> ${data.reply}</div>`;
                } else {
                    // هنا سيظهر الخطأ الذي أرسله السيرفر بدلاً من كلمة undefined
                    chat.innerHTML += `<div class="msg error"><b>⚠️ خطأ تقني:</b> ${data.error}</div>`;
                }
            } catch (err) {
                chat.innerHTML += `<div class="msg error"><b>⚠️ فشل الاتصال بالسيرفر:</b> ${err.message}</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
