<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملخصاتي AI | مساعدك الشخصي</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #3b82f6; --bg: #f3f4f6; --card: #ffffff; --text: #1f2937; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Header */
        .header { background: var(--card); padding: 10px 20px; text-align: center; border-bottom: 1px solid #e5e7eb; position: sticky; top: 0; z-index: 100; }
        .header h1 { margin: 0; font-size: 1.25rem; color: #111827; }
        .header p { margin: 5px 0 0; font-size: 0.8rem; color: #6b7280; }

        /* Chat Area */
        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .message-group { display: flex; align-items: flex-end; gap: 10px; max-width: 85%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Icons for Humans vs AI */
        .avatar { width: 35px; height: 35px; border-radius: 50%; background: #e5e7eb; display: flex; align-items: center; justify-content: center; color: white; font-size: 1rem; }
        .user-avatar { background: #6b7280; align-self: flex-start; }
        .ai-avatar { background: var(--primary); align-self: flex-end; }

        /* Chat Bubbles */
        .message-content { padding: 12px 16px; border-radius: 12px; line-height: 1.5; font-size: 0.95rem; }
        .user-group { align-self: flex-start; flex-direction: row-reverse; } /* To align user message to the right on RTL */
        .ai-group { align-self: flex-end; }
        
        .user-msg .message-content { background: var(--primary); color: white; border-top-left-radius: 2px; }
        .ai-msg .message-content { background: var(--card); color: var(--text); border: 1px solid #e5e7eb; border-top-right-radius: 2px; }
        
        .error-msg { background: #fee2e2; color: #b91c1c; align-self: center; text-align: center; font-size: 0.8rem; padding: 8px 15px; border-radius: 20px; border: 1px solid #fecaca; }

        /* Input Area */
        .input-group { background: var(--card); padding: 15px; display: flex; gap: 10px; align-items: center; border-top: 1px solid #e5e7eb; }
        input { flex: 1; background: #f9fafb; border: 1px solid #d1d5db; padding: 12px; border-radius: 8px; color: var(--text); outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }
        button { background: var(--primary); border: none; padding: 12px 20px; border-radius: 8px; color: white; cursor: pointer; transition: 0.2s; font-size: 0.9rem; font-weight: 500; }
        button:hover { background: #2563eb; }
        button:disabled { background: #d1d5db; cursor: not-allowed; }

    </style>
</head>
<body>
    <div class="header">
        <h1>مرحباً بك في ملخصاتي AI</h1>
        <p>مساعدك الشخصي لتلخيص النصوص والكتب</p>
    </div>

    <div id="chat-container">
        <div class="message-group ai-group ai-msg">
            <div class="avatar ai-avatar"><i class="fas fa-brain"></i></div>
            <div class="message-content">أهلاً بك! أنا مساعدك الشخصي، جاهز لتلخيص النصوص أو الإجابة على استفساراتك.</div>
        </div>
    </div>
    
    <div class="input-group">
        <input type="text" id="user-input" placeholder="اكتب سؤالك هنا..." onkeypress="if(event.key === 'Enter') sendMessage()">
        <button id="send-btn" onclick="sendMessage()">ارسال</button>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-container');
            const sendBtn = document.getElementById('send-btn');
            const text = input.value.trim();

            if (!text) return;

            // 1. إضافة رسالة المستخدم مع صورة رمزية
            container.innerHTML += `
                <div class="message-group user-group user-msg">
                    <div class="avatar user-avatar"><i class="fas fa-user"></i></div>
                    <div class="message-content">${text}</div>
                </div>
            `;
            
            input.value = '';
            input.disabled = true; // منع الإدخال أثناء التفكير
            sendBtn.disabled = true; // تعطيل زر الإرسال
            container.scrollTop = container.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                
                // 2. إزالة حالة الإدخال
                input.disabled = false;
                sendBtn.disabled = false;

                if (response.ok) {
                    // إضافة رد AI مع صورة رمزية
                    container.innerHTML += `
                        <div class="message-group ai-group ai-msg">
                            <div class="avatar ai-avatar"><i class="fas fa-brain"></i></div>
                            <div class="message-content">${data.reply}</div>
                        </div>
                    `;
                } else {
                    container.innerHTML += `<div class="message error-msg">⚠️ خطأ: ${data.error}</div>`;
                }
            } catch (err) {
                // إزالة حالة الإدخال في حالة الفشل
                input.disabled = false;
                sendBtn.disabled = false;
                container.innerHTML += `<div class="message error-msg">⚠️ فشل الاتصال بالسيرفر، تأكد من اتصالك بالإنترنت.</div>`;
            }
            container.scrollTop = container.scrollHeight;
            input.focus(); // إعادة التركيز على حقل الإدخال
        }
    </script>
</body>
</html>
